# Local-only dev database. NOT used in prod (prod Postgres lives on the udl box).
# `docker compose up -d` then `npm run db:load` to seed from a db:pull bundle.
services:
  db:
    image: postgis/postgis:15-3.4
    container_name: localfinds-db
    environment:
      POSTGRES_USER: localfinds
      POSTGRES_PASSWORD: localfinds
      POSTGRES_DB: localfinds
    ports:
      - "5434:5432"
    volumes:
      - localfinds_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U localfinds -d localfinds"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  localfinds_pgdata:
